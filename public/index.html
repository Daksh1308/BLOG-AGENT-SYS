<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Writing Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 24px; margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; outline: none; }
    input:focus, textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.15); }
    textarea { resize: vertical; min-height: 80px; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    button { background: #2563eb; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .hidden { display: none !important; }
    #loading { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 12px 16px; border-radius: 6px; }
    #result h2 { margin-bottom: 8px; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .badge { background: #e5e7eb; padding: 4px 10px; border-radius: 4px; font-size: .8rem; }
    .badge.green { background: #d1fae5; color: #065f46; }
    .badge.yellow { background: #fef3c7; color: #92400e; }
    .badge.blue { background: #dbeafe; color: #1e40af; }
    #markdown { padding: 16px; background: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb; line-height: 1.7; overflow-x: auto; }
    #markdown h1 { font-size: 1.6rem; margin: .8em 0 .4em; }
    #markdown h2 { font-size: 1.3rem; margin: .8em 0 .4em; }
    #markdown h3 { font-size: 1.1rem; margin: .6em 0 .3em; }
    #markdown p { margin: .5em 0; }
    #markdown code { background: #e5e7eb; padding: 2px 5px; border-radius: 3px; font-size: .9em; }
    #markdown pre code { display: block; padding: 12px; overflow-x: auto; }
    #markdown img { max-width: 100%; border-radius: 4px; }
    #markdown ul, #markdown ol { padding-left: 24px; margin: .5em 0; }
    #markdown blockquote { border-left: 4px solid #2563eb; padding: 8px 16px; margin: .5em 0; background: #f0f4ff; color: #333; }
    #tasks { margin-bottom: 16px; }
    .task { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: .9rem; }
    .task .tid { background: #2563eb; color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; }
    .task .tinfo { flex: 1; }
    .task .tinfo strong { display: block; }
    .task .tinfo span { color: #666; font-size: .8rem; }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .actions button { font-size: .85rem; padding: 8px 16px; }
    #evidence-list { font-size: .9rem; }
    #evidence-list a { color: #2563eb; text-decoration: none; }
    #evidence-list a:hover { text-decoration: underline; }
    #evidence-list li { padding: 4px 0; }
    #queries { margin-top: 8px; }
    .query-item { background: #f0f4ff; padding: 4px 8px; border-radius: 4px; display: inline-block; margin: 2px; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Blog Writing Agent</h1>
    <p class="sub">Enter a topic and let AI research, plan, and write a technical blog post.</p>

    <div class="card">
      <div class="row">
        <div>
          <label for="topic">Topic</label>
          <textarea id="topic" placeholder="e.g. Self Attention in Transformers"></textarea>
        </div>
      </div>
      <div class="row mt-4">
        <div>
          <label for="as_of">As-of date</label>
          <input type="date" id="as_of">
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button id="generateBtn" onclick="generate()">Generate Blog</button>
        </div>
      </div>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Generating blog... this may take 30-60s</p>
    </div>

    <div id="error" class="hidden"></div>

    <div id="result" class="hidden">
      <div class="card">
        <h2 id="blog_title"></h2>
        <div class="meta" id="meta"></div>
      </div>

      <div class="card" id="plan_card">
        <h3>Plan</h3>
        <div id="tasks"></div>
        <div id="queries"></div>
      </div>

      <div class="card" id="evidence_card" class="hidden">
        <h3>Evidence</h3>
        <ol id="evidence-list"></ol>
      </div>

      <div class="card">
        <h3>Blog Post</h3>
        <div id="markdown"></div>
        <div class="actions">
          <button onclick="downloadMD()">Download Markdown</button>
          <button onclick="copyMD()">Copy to Clipboard</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/generate';
    let lastResult = null;

    document.addEventListener('DOMContentLoaded', () => {
      const d = new Date();
      document.getElementById('as_of').value = d.toISOString().split('T')[0];
    });

    async function generate() {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) { alert('Please enter a topic.'); return; }

      const btn = document.getElementById('generateBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const result = document.getElementById('result');

      btn.disabled = true;
      loading.classList.remove('hidden');
      error.classList.add('hidden');
      result.classList.add('hidden');
      lastResult = null;

      try {
        const resp = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic,
            as_of: document.getElementById('as_of').value,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        lastResult = data;
        render(data);
      } catch (e) {
        error.textContent = 'Error: ' + e.message;
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        loading.classList.add('hidden');
      }
    }

    function render(data) {
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('blog_title').textContent = data.blog_title;

      const meta = document.getElementById('meta');
      meta.innerHTML = `
        <span class="badge ${data.mode === 'closed_book' ? 'green' : data.mode === 'hybrid' ? 'yellow' : 'blue'}">${data.mode}</span>
        <span class="badge">${data.needs_research ? 'Research: yes' : 'Research: no'}</span>
        <span class="badge">${data.tasks.length} sections</span>
      `;

      // Plan
      const tasksEl = document.getElementById('tasks');
      tasksEl.innerHTML = data.tasks.map(t => `
        <div class="task">
          <div class="tid">${t.id}</div>
          <div class="tinfo">
            <strong>${t.title}</strong>
            <span>${t.goal} &middot; ${t.target_words} words${t.requires_code ? ' &middot; includes code' : ''}${t.requires_citations ? ' &middot; cites sources' : ''}</span>
          </div>
        </div>
      `).join('');

      if (data.queries && data.queries.length) {
        document.getElementById('queries').innerHTML = '<strong>Searched:</strong> ' +
          data.queries.map(q => `<span class="query-item">${q}</span>`).join('');
      } else {
        document.getElementById('queries').innerHTML = '';
      }

      // Evidence
      const evCard = document.getElementById('evidence_card');
      const evList = document.getElementById('evidence-list');
      if (data.evidence && data.evidence.length) {
        evCard.classList.remove('hidden');
        evList.innerHTML = data.evidence.map(e => `<li><a href="${e.url || '#'}" target="_blank">${e.title || e.url}</a>${e.published_at ? ' <small>(' + e.published_at + ')</small>' : ''}</li>`).join('');
      } else {
        evCard.classList.add('hidden');
      }

      // Markdown
      document.getElementById('markdown').innerHTML = marked.parse(data.markdown);
    }

    function downloadMD() {
      if (!lastResult) return;
      const blob = new Blob([lastResult.markdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (lastResult.blog_title || 'blog').toLowerCase().replace(/[^a-z0-9]+/g, '_') + '.md';
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyMD() {
      if (!lastResult) return;
      navigator.clipboard.writeText(lastResult.markdown).then(() => {
        alert('Copied to clipboard!');
      });
    }
  </script>
</body>
</html>
